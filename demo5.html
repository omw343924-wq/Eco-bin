<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login</title>
    <style>
        .inp {
            font-weight: bold;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            color: #333;
            background-image: url('bg ecobin.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        .login-card {
            background-color: white;
            border: 1.5px solid black;
            border-radius: 20px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }
        .img-hero-1 {
            max-width: 100%;
            height: auto;
        }
        .img-hero-2 {
            max-width: 100%;
            height: auto;
        }

        #logo {
            margin-top: -5px;
            width: 100%;
            max-width: 650px;
            height: auto;
            margin-left: auto;
            margin-right: auto;
        }

        .icons {
            margin-top: -50px;
            width: 100%;
            max-width: 700px;
            height: auto;
            margin-left: auto;
            margin-right: auto;
        }

        .form {
            margin-top: -20px;
        }
        .link{
            display: flex;
            justify-content: space-evenly;
            flex-wrap: wrap;
            gap: 10px;
        }

        @media (max-width: 768px) {
            #dia {
                margin-left: 0 !important;
                text-align: center;
            }
            #logo, .icons {
                margin-left: 0 !important;
                margin-top: 0 !important;
            }
            .form {
                margin-top: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container min-vh-100 d-flex align-items-center py-5">
        <div class="row w-100 align-items-center g-4">


            <div class="col-lg-6 text-center text-lg-start">
                <div id="dia" class="mb-4">
                    <h1 class="fw-bold">Smart Solution For<br>
                        <span style="color: green; font-size: 20px;"> Cleaner Tomorrow.</span>
                    </h1>
                    <div class="p1 mt-2 text-secondary">
                        <p>Join us in creating a cleaner,<br>safer and greener planet.</p>
                    </div>
                </div>

                <div class="img1 d-flex flex-column align-items-center align-items-lg-start gap-3">
                    <div id="logo">
                        <img src="logo.png" class="img-hero-1 img-fluid" alt="Logo Graphics">
                    </div>
                    <div>
                        <img src="icon.png" class="img-hero-2 icons img-fluid" alt="Icon Graphics">
                    </div>
                </div>
            </div>


            <div class="col-lg-6 d-flex justify-content-center align-items-center formmain">
                <form action="" method="get" class="login-card form">
                    <div class="logo1">
                        <div class="text-center mb-3 ">
                            <img src="ecobin logo.png" class="img-fluid"
                                style="max-width: 300px; height: auto; margin-top: -20px;" alt="EcoBin Logo">
                        </div>

                        <div class="text-center mb-4">
                            <h2 style="color: green; margin-top: -20px;"><b>Welcome Back!</b></h2>
                            <h6 class="text-muted">Login to your account</h6>
                            <hr
                                style="width: 50px; color: green; margin: 10px auto; border-top: 3px solid green; opacity: 1;">
                        </div>


                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label">Email address</label>
                            <input type="email" class="form-control inp" id="exampleInputEmail1"
                                aria-describedby="emailHelp">
                            <div id="emailHelp" class="form-text">Never share your email with anyone else.</div>
                        </div>

                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">Password</label>
                            <input type="password" class="form-control inp" id="exampleInputPassword1">
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="exampleCheck1">
                            <label class="form-check-label" for="exampleCheck1">Remember me</label>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary w-100 py-2">Login &rarr;</button>
                        </div><br>
                        <p style="text-align: center;"> -------- Or Continue with --------</p>
                    </div>
                    <div>
                        <div class="link">
                            <button class="btn btn-light border d-flex align-items-center gap-2">
                                <img src="google.jpg" alt="Google" width="20" height="20">
                                Google
                            </button>
                            
                            <button class="btn btn-light border d-flex align-items-center gap-2">
                             <img src="microsoft.jpg" alt="Microsoft" width="20" height="20">
                                Microsoft
                            </button>
                            
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>

</body>

</html>
